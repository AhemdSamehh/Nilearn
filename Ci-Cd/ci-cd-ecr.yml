name: CI-CD - Build and Push Nilearn API to Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ahmedsameho
  API_IMAGE_NAME: nilearn-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.ACCESS_Demo_KEY }}

      - name: Build API image
        run: |
          docker build \
            -t $DOCKERHUB_USERNAME/$API_IMAGE_NAME:$IMAGE_TAG \
            -t $DOCKERHUB_USERNAME/$API_IMAGE_NAME:latest \
            -f Dockerfile .

      - name: Push API image
        if: github.event_name != 'pull_request'
        run: |
          docker push $DOCKERHUB_USERNAME/$API_IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$API_IMAGE_NAME:latest